<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Matchly beheer</title>
<style>
  /* Matchly-huisstijl: donker, met felle roze/magenta accentkleur en blauw-paars verloop op
     highlights -- overgenomen van matchlyapp.nl zodat de beheerpagina hetzelfde premium gevoel
     heeft als de rest van het merk, in plaats van een generiek lichtgrijs beheerscherm. */
  :root {
    --bg: #0a0a10;
    --card: #14141e;
    --card-border: #24242f;
    --text: #f2f2f5;
    --muted: #9494a3;
    --accent: #ef1a78;
    --accent-2: #ff4fa0;
    --grad-a: #3d5afe;
    --grad-b: #ef1a78;
    --danger: #ff5470;
    --success: #22c98e;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; font-size: 16px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); padding-bottom: 48px; }
  header { background: linear-gradient(135deg, #0d0d16 0%, #15101f 100%); border-bottom: 1px solid var(--card-border); color: #fff; padding: 20px 16px 16px; display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  header h1 { margin: 0; font-size: 14px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; font-family: ui-monospace, 'SF Mono', Menlo, monospace; background: linear-gradient(90deg, var(--grad-a), var(--grad-b)); -webkit-background-clip: text; background-clip: text; color: transparent; }
  header h2 { margin: 5px 0 0; font-size: 24px; font-weight: 800; letter-spacing: -.2px; color: #fff; }
  header p { margin: 4px 0 0; font-size: 15px; color: var(--muted); line-height: 1.4; max-width: 320px; }
  .wa-back { flex-shrink: 0; display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.14); color: #fff; text-decoration: none; font-size: 14px; font-weight: 600; padding: 8px 12px; border-radius: 999px; white-space: nowrap; }
  .wa-back:active { background: rgba(255,255,255,.16); }
  .matt-card { display: flex; align-items: center; gap: 12px; background: rgba(61,90,254,.06); border: 1px solid rgba(239,26,120,.25); border-radius: 14px; padding: 12px 14px; margin-top: 6px; box-shadow: 0 0 24px rgba(239,26,120,.08); }
  .matt-card img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; flex-shrink: 0; border: 1.5px solid rgba(239,26,120,.4); }
  .matt-card .matt-text { flex: 1; min-width: 0; }
  .matt-card strong { display: block; font-size: 16px; color: var(--text); }
  .matt-card p { margin: 2px 0 0; font-size: 14.5px; color: var(--muted); line-height: 1.35; }
  .matt-card a.matt-btn { display: inline-block; margin-top: 8px; font-size: 14px; font-weight: 700; padding: 7px 12px; border-radius: 999px; background: linear-gradient(135deg, var(--grad-a), var(--accent)); color: #fff; text-decoration: none; }
  .teaser-card { border: 1px dashed var(--card-border); border-radius: 14px; padding: 12px 14px; margin-top: 10px; }
  .teaser-card strong { display: block; font-size: 13px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; color: var(--muted); }
  .teaser-card p { margin: 4px 0 0; font-size: 14.5px; color: var(--muted); line-height: 1.4; }
  nav.tabs { display: flex; position: sticky; top: 0; background: rgba(10,10,16,.92); backdrop-filter: blur(8px); border-bottom: 1px solid var(--card-border); z-index: 10; }
  nav.tabs a.tab { flex: 1; text-align: center; padding: 14px 4px; text-decoration: none; color: var(--muted); font-size: 15px; font-weight: 600; border-bottom: 2px solid transparent; }
  nav.tabs a.tab-active { color: #fff; border-bottom-color: var(--accent); }
  main { padding: 14px; max-width: 520px; margin: 0 auto; }
  .card { background: var(--card); border: 1px solid var(--card-border); border-radius: 14px; padding: 15px; margin-bottom: 12px; box-shadow: 0 4px 16px rgba(0,0,0,.25); }
  .row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .row + .row { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--card-border); }
  .name { font-weight: 600; font-size: 17px; color: var(--text); }
  .meta { font-size: 15px; color: var(--muted); margin-top: 2px; }
  .badge { display: inline-block; font-size: 12.5px; font-weight: 700; padding: 3px 8px; border-radius: 999px; background: rgba(61,90,254,.16); color: #93a5ff; margin-left: 6px; }
  .badge-hoofd { background: rgba(255,193,79,.16); color: #ffcf75; }
  .badge-type { background: rgba(148,148,163,.14); color: var(--muted); margin-left: 6px; }
  .badge-type-beker { background: rgba(255,193,79,.16); color: #ffcf75; }
  .badge-type-oefen { background: rgba(34,201,142,.16); color: #5fe0b5; }
  .badge-type-promotie { background: rgba(239,26,120,.16); color: var(--accent-2); }
  button, .btn { font-size: 16px; font-weight: 700; padding: 12px 16px; border-radius: 10px; border: none; cursor: pointer; }
  .btn-primary { background: linear-gradient(135deg, var(--grad-a), var(--accent)); color: #fff; }
  .btn-outline { background: transparent; color: var(--text); border: 1.5px solid var(--card-border); }
  .btn-danger { background: transparent; color: var(--danger); border: 1.5px solid rgba(255,84,112,.4); }
  .btn-sm { padding: 8px 12px; font-size: 14px; }
  input[type=text], input[type=date], input[type=time], input[type=file] { width: 100%; padding: 12px; border: 1.5px solid var(--card-border); border-radius: 10px; font-size: 17px; margin-top: 4px; background: #0d0d14; color: var(--text); }
  input[type=text]::placeholder { color: #5a5a68; }
  label { font-size: 13px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; color: var(--muted); display: block; margin-top: 12px; }
  .add-form strong { color: var(--text); font-size: 17px; }
  .add-form button { margin-top: 14px; width: 100%; }
  .flash { background: rgba(34,201,142,.12); color: var(--success); border: 1px solid rgba(34,201,142,.3); padding: 12px 14px; border-radius: 10px; font-size: 16px; margin-bottom: 12px; }
  .error-box { background: rgba(255,84,112,.12); color: var(--danger); border: 1px solid rgba(255,84,112,.3); padding: 12px 14px; border-radius: 10px; font-size: 16px; margin-bottom: 12px; }
  .empty { color: var(--muted); font-size: 16px; text-align: center; padding: 20px 0; }
  .thumbs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .thumb { position: relative; aspect-ratio: 1; border-radius: 10px; overflow: hidden; background: #1c1c28; border: 1px solid var(--card-border); }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .thumb .del { position: absolute; top: 4px; right: 4px; padding: 5px 9px; font-size: 13px; background: rgba(10,10,16,.7); border-color: rgba(255,84,112,.6); }
  .radio-group { display: flex; gap: 10px; margin-top: 6px; }
  .radio-group label { font-weight: 500; text-transform: none; letter-spacing: 0; font-size: 16px; color: var(--text); display: flex; align-items: center; gap: 4px; margin-top: 0; }
  footer { text-align: center; color: var(--muted); font-size: 14px; padding: 20px 14px 0; }
  .loading { text-align: center; color: var(--muted); padding: 60px 14px; font-size: 16px; }
  .not-valid { font-family: -apple-system, sans-serif; background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; text-align: center; color: var(--text); }
</style>
</head>
<body>
<div id="app"><div class="loading">Bezig met laden&hellip;</div></div>

<script>
(function () {
  // NIEUW: de API draait op Supabase (kan zelf geen HTML serveren, zie beheer-functie), dus deze
  // statische pagina op Netlify haalt alles op via fetch() en rendert client-side.
  var API_URL = 'https://qoemlqlhnrzvyujyehnc.supabase.co/functions/v1/beheer';
  // NIEUW: rechtstreekse terugkeer naar het WhatsApp-menu. 'text=menu' staat al klaar in het
  // invoerveld -- de gebruiker hoeft alleen op verzenden te tikken om meteen het menu te zien,
  // i.p.v. zelf te moeten bedenken wat te typen na het verlaten van deze pagina.
  var WHATSAPP_MENU_LINK = 'https://wa.me/31620767042?text=menu';
  // NIEUW: vaste Matt-avatar, centraal hier gedefinieerd (config-achtige constante bovenaan de
  // beheerfunctie) zodat er maar op \u00e9\u00e9n plek iets aangepast hoeft te worden mocht de
  // afbeelding ooit vervangen worden.
  var MATT_AVATAR_URL = 'https://res.cloudinary.com/ds82thcrx/image/upload/v1784122125/a26jmyd5gxpkbkqesigt.jpg';

  function getTokenFromPath() {
    // Pad ziet er zo uit: /beheer/<token> -- pak het segment na 'beheer'.
    var parts = location.pathname.split('/').filter(Boolean);
    var idx = parts.indexOf('beheer');
    return idx >= 0 && parts[idx + 1] ? decodeURIComponent(parts[idx + 1]) : '';
  }

  function getTab() {
    var params = new URLSearchParams(location.search);
    var t = (params.get('tab') || 'programma').toLowerCase();
    return ['programma', 'sponsors', 'fotos'].indexOf(t) >= 0 ? t : 'programma';
  }

  function escapeHtml(s) {
    return (s || '').toString()
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  var token = getTokenFromPath();
  var tab = getTab();
  var app = document.getElementById('app');

  function tabLink(id, label) {
    var active = id === tab ? ' tab-active' : '';
    return '<a class="tab' + active + '" href="/beheer/' + encodeURIComponent(token) + '?tab=' + id + '">' + label + '</a>';
  }

  function renderMattCard() {
    return '<div class="matt-card">' +
      '<img src="' + MATT_AVATAR_URL + '" alt="Matt">' +
      '<div class="matt-text">' +
      '<strong>Matt helpt je verder \u26bd</strong>' +
      '<p>Kom je er niet uit? Stuur gewoon een appje naar Matt via WhatsApp.</p>' +
      '<a class="matt-btn" href="' + WHATSAPP_MENU_LINK + '">Terug naar WhatsApp</a>' +
      '</div></div>';
  }

  function renderTeaserCard() {
    return '<div class="teaser-card">' +
      '<strong>Binnenkort in de Clubassistent</strong>' +
      '<p>Meer clubcontent vanuit \u00e9\u00e9n plek, zoals sponsors uitlichten, vrijwilliger van de maand en extra maandposts.</p>' +
      '</div>';
  }

  function renderShell(club, bodyHtml, flashHtml) {
    document.title = 'Matchly Clubassistent -- ' + club.name;
    app.innerHTML =
      '<header><div><h1>Matchly Clubassistent</h1><h2>' + escapeHtml(club.name) + ' beheren</h2><p>Beheer programma, sponsors en foto\'s voor jullie Matchly-content.</p></div>' +
      '<a class="wa-back" href="' + WHATSAPP_MENU_LINK + '">\u2b05\ufe0f WhatsApp</a></header>' +
      '<nav class="tabs">' + tabLink('programma', '\u26bd Programma') + tabLink('sponsors', '\ud83d\udcbc Sponsors') + tabLink('fotos', '\ud83d\udcf8 Foto\'s') + '</nav>' +
      '<main>' + (flashHtml || '') + bodyHtml + renderMattCard() + renderTeaserCard() + '</main>' +
      '<footer>Wijzigingen zijn direct zichtbaar. Vragen? Stuur gewoon een appje naar Matt op WhatsApp.</footer>';
  }

  function renderNotValid(message) {
    app.innerHTML = '<div class="not-valid"><div><h2>Deze link is niet (meer) geldig \u26a0\ufe0f</h2><p>' + escapeHtml(message || 'Vraag in WhatsApp aan Matt om een nieuwe beheerlink door \'menu\' te typen.') + '</p><p style="margin-top:16px;"><a class="btn btn-primary" href="' + WHATSAPP_MENU_LINK + '" style="text-decoration:none;display:inline-block;">\u2b05\ufe0f Terug naar WhatsApp</a></p></div></div>';
  }

  function renderProgramma(fixtures, cloudName) {
    var rows = (fixtures || []).map(function (f) {
      var typeClass = f.matchType === 'beker' ? ' badge-type-beker' : f.matchType === 'oefen' ? ' badge-type-oefen' : f.matchType === 'promotie' ? ' badge-type-promotie' : '';
      return '<div class="row"><div>' +
        '<div class="name">' + (f.isHome ? 'Thuis' : 'Uit') + ' tegen ' + escapeHtml(f.opponent) + '<span class="badge badge-type' + typeClass + '">' + escapeHtml(f.matchTypeLabel || 'Competitie') + '</span></div>' +
        '<div class="meta">' + escapeHtml(f.dateLabel) + '</div>' +
        '</div><button class="btn-danger btn-sm" data-action="delete_fixture" data-fixture-id="' + f.id + '">Verwijder</button></div>';
    }).join('');

    // NIEUW: schema uploaden als foto of PDF -- gebruikt dezelfde uitleesmotor (programma-agent)
    // als de WhatsApp-flow. Wordt eerst ter controle getoond (scheduleParsePreview), pas na
    // "Toevoegen" bevestigd komen de wedstrijden echt in de agenda.
    var uploadCard = '<div class="card add-form">' +
      '<strong>Schema uploaden (foto of PDF)</strong>' +
      '<p class="meta" style="margin-top:4px;">Een screenshot van jullie competitieschema, een foto van een prikbord, of een PDF -- ik lees de wedstrijden er automatisch uit.</p>' +
      '<form id="uploadScheduleForm">' +
      '<input type="file" id="scheduleInput" accept="image/*,application/pdf" required>' +
      '<button type="submit" class="btn-primary" id="scheduleUploadBtn">Uitlezen</button>' +
      '</form>' +
      '<div id="scheduleParsePreview"></div>' +
      '<input type="hidden" id="cloudNameProgramma" value="' + escapeHtml(cloudName || '') + '">' +
      '</div>';

    return '<div class="card">' + (rows || '<div class="empty">Nog geen wedstrijden gepland.</div>') + '</div>' +
      uploadCard +
      '<div class="card add-form">' +
      '<strong>Eén wedstrijd handmatig toevoegen</strong>' +
      '<form id="addFixtureForm">' +
      '<label>Type wedstrijd</label>' +
      '<div class="radio-group" style="flex-wrap:wrap;">' +
      '<label><input type="radio" name="match_type" value="competitie" checked> Competitie</label>' +
      '<label><input type="radio" name="match_type" value="beker"> Beker</label>' +
      '<label><input type="radio" name="match_type" value="oefen"> Oefen</label>' +
      '<label><input type="radio" name="match_type" value="promotie"> Promotie/degradatie</label>' +
      '</div>' +
      '<label>Tegenstander</label><input type="text" name="opponent" placeholder="bv. Excelsior Maassluis" required>' +
      '<label>Datum</label><input type="date" name="date" required>' +
      '<label>Tijd</label><input type="time" name="time" value="14:30" required>' +
      '<div class="radio-group">' +
      '<label><input type="radio" name="thuis_of_uit" value="thuis" checked> Thuis</label>' +
      '<label><input type="radio" name="thuis_of_uit" value="uit"> Uit</label>' +
      '</div>' +
      '<button type="submit" class="btn-primary">Toevoegen</button>' +
      '</form></div>';
  }

  function renderSponsors(sponsors) {
    var rows = (sponsors || []).map(function (s) {
      return '<div class="row"><div>' +
        '<div class="name">' + escapeHtml(s.name) + '</div>' +
        '<div class="meta"><span class="badge' + (s.tier === '1' ? ' badge-hoofd' : '') + '">' + (s.tier === '1' ? 'Hoofdsponsor' : 'Roulerend') + '</span></div>' +
        '</div><div style="display:flex;gap:6px;">' +
        '<button class="btn-outline btn-sm" data-action="toggle_tier" data-sponsor-id="' + s.id + '" data-current-tier="' + s.tier + '">' + (s.tier === '1' ? 'Maak roulerend' : 'Maak hoofdsponsor') + '</button>' +
        '<button class="btn-danger btn-sm" data-action="delete_sponsor" data-sponsor-id="' + s.id + '">Verwijder</button>' +
        '</div></div>';
    }).join('');

    return '<div class="card">' + (rows || '<div class="empty">Nog geen sponsors.</div>') + '</div>' +
      '<div class="card add-form">' +
      '<strong>Sponsor toevoegen</strong>' +
      '<form id="addSponsorForm">' +
      '<label>Naam</label><input type="text" name="name" placeholder="bv. De Bakker" required>' +
      '<button type="submit" class="btn-primary">Toevoegen</button>' +
      '</form></div>';
  }

  function renderFotos(photos, cloudName) {
    var thumbs = (photos || []).map(function (p) {
      return '<div class="thumb"><img src="' + escapeHtml(p.image_url) + '" loading="lazy">' +
        '<button class="btn-danger del" data-action="delete_photo" data-photo-id="' + p.id + '">\u2715</button></div>';
    }).join('');

    return '<div class="card">' + (thumbs ? '<div class="thumbs">' + thumbs + '</div>' : '<div class="empty">Nog geen foto\'s aangeleverd.</div>') + '</div>' +
      '<div class="card add-form">' +
      '<strong>Foto uploaden</strong>' +
      '<form id="uploadForm">' +
      '<input type="file" id="photoInput" accept="image/*" required>' +
      '<button type="submit" class="btn-primary" id="uploadBtn">Uploaden</button>' +
      '</form></div>' +
      '<input type="hidden" id="cloudName" value="' + escapeHtml(cloudName) + '">';
  }

  async function postAction(payload) {
    var res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(Object.assign({ token: token, tab: tab }, payload)),
    });
    return res.json();
  }

  function attachHandlers(flashCallback) {
    document.querySelectorAll('button[data-action]').forEach(function (btn) {
      btn.addEventListener('click', async function () {
        btn.disabled = true;
        var action = btn.getAttribute('data-action');
        var payload = { action: action };
        if (btn.dataset.fixtureId) payload.fixture_id = btn.dataset.fixtureId;
        if (btn.dataset.sponsorId) payload.sponsor_id = btn.dataset.sponsorId;
        if (btn.dataset.currentTier) payload.current_tier = btn.dataset.currentTier;
        if (btn.dataset.photoId) payload.photo_id = btn.dataset.photoId;
        var result = await postAction(payload);
        if (result.ok) { flashCallback(result.flash); load(result.flash); }
        else { btn.disabled = false; alert(result.message || 'Er ging iets mis.'); }
      });
    });

    var fixtureForm = document.getElementById('addFixtureForm');
    if (fixtureForm) fixtureForm.addEventListener('submit', async function (e) {
      e.preventDefault();
      var fd = new FormData(fixtureForm);
      var result = await postAction({ action: 'add_fixture', opponent: fd.get('opponent'), date: fd.get('date'), time: fd.get('time'), thuis_of_uit: fd.get('thuis_of_uit'), match_type: fd.get('match_type') });
      if (result.ok) load(result.flash); else alert(result.message || 'Er ging iets mis.');
    });

    // NIEUW: schema-upload -- bestand naar Cloudinary, dan laten uitlezen (parse_schedule), dan
    // de herkende wedstrijden tonen ter controle voordat ze echt worden toegevoegd.
    var scheduleForm = document.getElementById('uploadScheduleForm');
    var parsedFixtures = [];
    if (scheduleForm) scheduleForm.addEventListener('submit', async function (e) {
      e.preventDefault();
      var fileInput = document.getElementById('scheduleInput');
      var cloudName = document.getElementById('cloudNameProgramma').value;
      var btn = document.getElementById('scheduleUploadBtn');
      var previewEl = document.getElementById('scheduleParsePreview');
      if (!fileInput.files.length) return;
      var file = fileInput.files[0];
      var isPdf = file.type === 'application/pdf';
      btn.disabled = true; btn.textContent = 'Bezig met uitlezen...';
      previewEl.innerHTML = '';
      try {
        var fd = new FormData();
        fd.append('file', file);
        fd.append('upload_preset', 'matchly_design');
        var res = await fetch('https://api.cloudinary.com/v1_1/' + cloudName + '/auto/upload', { method: 'POST', body: fd });
        var data = await res.json();
        if (!data.secure_url) throw new Error('upload mislukt');
        var parseResult = await postAction({ action: 'parse_schedule', image_url: data.secure_url, media_type: isPdf ? 'pdf' : 'image' });
        if (!parseResult.ok) { alert(parseResult.message || 'Ik kon er geen wedstrijden uit halen.'); btn.disabled = false; btn.textContent = 'Uitlezen'; return; }
        parsedFixtures = parseResult.fixtures || [];
        renderSchedulePreview();
      } catch (err) {
        alert('Uitlezen mislukt, probeer het nog eens.');
      }
      btn.disabled = false; btn.textContent = 'Uitlezen';
    });

    function renderSchedulePreview() {
      var previewEl = document.getElementById('scheduleParsePreview');
      if (!previewEl) return;
      if (!parsedFixtures.length) { previewEl.innerHTML = ''; return; }
      var rows = parsedFixtures.map(function (f, i) {
        return '<div class="row"><div>' +
          '<div class="name">' + (f.thuis_of_uit === 'uit' ? 'Uit' : 'Thuis') + ' tegen ' + escapeHtml(f.opponent || '?') + '</div>' +
          '<div class="meta">' + escapeHtml(f.date || '') + ' ' + escapeHtml(f.time || '') + '</div>' +
          '</div><button type="button" class="btn-danger btn-sm" data-preview-remove="' + i + '">Verwijder</button></div>';
      }).join('');
      previewEl.innerHTML =
        '<div style="margin-top:14px;padding-top:14px;border-top:1px solid #f0f0f0;">' +
        '<strong>' + parsedFixtures.length + ' herkende wedstrijd' + (parsedFixtures.length === 1 ? '' : 'en') + ' -- controleer voor je bevestigt:</strong>' +
        '<div style="margin-top:8px;">' + rows + '</div>' +
        '<label>Type (geldt voor alle herkende wedstrijden)</label>' +
        '<div class="radio-group" style="flex-wrap:wrap;">' +
        '<label><input type="radio" name="preview_match_type" value="competitie" checked> Competitie</label>' +
        '<label><input type="radio" name="preview_match_type" value="beker"> Beker</label>' +
        '<label><input type="radio" name="preview_match_type" value="oefen"> Oefen</label>' +
        '<label><input type="radio" name="preview_match_type" value="promotie"> Promotie/degradatie</label>' +
        '</div>' +
        '<button type="button" class="btn-primary" id="confirmScheduleBtn" style="margin-top:14px;width:100%;">' + parsedFixtures.length + ' wedstrijd' + (parsedFixtures.length === 1 ? '' : 'en') + ' toevoegen</button>' +
        '</div>';

      previewEl.querySelectorAll('[data-preview-remove]').forEach(function (btn) {
        btn.addEventListener('click', function () {
          parsedFixtures.splice(Number(btn.getAttribute('data-preview-remove')), 1);
          renderSchedulePreview();
        });
      });
      var confirmBtn = document.getElementById('confirmScheduleBtn');
      if (confirmBtn) confirmBtn.addEventListener('click', async function () {
        confirmBtn.disabled = true; confirmBtn.textContent = 'Bezig...';
        var typeInput = previewEl.querySelector('input[name="preview_match_type"]:checked');
        var result = await postAction({ action: 'add_fixtures_bulk', fixtures: parsedFixtures, match_type: typeInput ? typeInput.value : 'competitie' });
        if (result.ok) { parsedFixtures = []; load(result.flash); }
        else { alert(result.message || 'Er ging iets mis.'); confirmBtn.disabled = false; confirmBtn.textContent = 'Opnieuw proberen'; }
      });
    }

    var sponsorForm = document.getElementById('addSponsorForm');
    if (sponsorForm) sponsorForm.addEventListener('submit', async function (e) {
      e.preventDefault();
      var fd = new FormData(sponsorForm);
      var result = await postAction({ action: 'add_sponsor', name: fd.get('name') });
      if (result.ok) load(result.flash); else alert(result.message || 'Er ging iets mis.');
    });

    var uploadForm = document.getElementById('uploadForm');
    if (uploadForm) uploadForm.addEventListener('submit', async function (e) {
      e.preventDefault();
      var fileInput = document.getElementById('photoInput');
      var cloudName = document.getElementById('cloudName').value;
      var btn = document.getElementById('uploadBtn');
      if (!fileInput.files.length) return;
      btn.disabled = true; btn.textContent = 'Bezig...';
      try {
        var fd = new FormData();
        fd.append('file', fileInput.files[0]);
        fd.append('upload_preset', 'matchly_design');
        var res = await fetch('https://api.cloudinary.com/v1_1/' + cloudName + '/image/upload', { method: 'POST', body: fd });
        var data = await res.json();
        if (data.secure_url) {
          var result = await postAction({ action: 'add_photo', image_url: data.secure_url });
          if (result.ok) load(result.flash); else { alert(result.message || 'Er ging iets mis.'); btn.disabled = false; btn.textContent = 'Uploaden'; }
        } else {
          alert('Upload mislukt, probeer het nog eens.');
          btn.disabled = false; btn.textContent = 'Uploaden';
        }
      } catch (err) {
        alert('Upload mislukt, probeer het nog eens.');
        btn.disabled = false; btn.textContent = 'Uploaden';
      }
    });
  }

  async function load(flash) {
    tab = getTab();
    try {
      var res = await fetch(API_URL + '?token=' + encodeURIComponent(token) + '&tab=' + tab);
      var result = await res.json();
      if (!result.ok) { renderNotValid(result.message); return; }

      var flashHtml = flash ? '<div class="flash">' + escapeHtml(flash) + '</div>' : '';
      var bodyHtml = '';
      if (tab === 'programma') bodyHtml = renderProgramma(result.data.fixtures, result.cloud_name);
      else if (tab === 'sponsors') bodyHtml = renderSponsors(result.data.sponsors);
      else if (tab === 'fotos') bodyHtml = renderFotos(result.data.photos, result.cloud_name);

      renderShell(result.club, bodyHtml, flashHtml);
      attachHandlers(function () {});
    } catch (e) {
      app.innerHTML = '<div class="not-valid"><div><h2>Er ging iets mis \u26a0\ufe0f</h2><p>Probeer de pagina te verversen.</p></div></div>';
    }
  }

  if (!token) {
    renderNotValid('Geen token gevonden in de link.');
  } else {
    load();
  }
})();
</script>
</body>
</html>
